<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Mì</title>
  <link rel="stylesheet" href="Mi.css">
</head>
<body>
  <main class="stage">
    <div class="glow glow-one"></div>
    <div class="glow glow-two"></div>
    <div class="glow glow-three"></div>
    <div class="glow glow-four"></div>
    <div class="confetti" aria-hidden="true"></div>

    <section class="screen screen-letter is-active" data-screen="0">
      <div class="mail-scene" aria-label="Thiep chao mung">
        <article class="letter">
          <div class="heart-stack">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <h1>Hello Mì and Be(Y.Trang) </h1>
          <p>A nhận được một cái thùng nì hong bicc của nhà ai nửa =))</p>
          <p>của ai của ai của ai =))</p>

        </article>

        <div class="envelope">
          <div class="env-back"></div>
          <div class="env-flap"></div>
          <div class="env-left"></div>
          <div class="env-right"></div>
          <div class="env-front"></div>
          <div class="env-seal"></div>
        </div>
      </div>
    </section>

    <section class="screen screen-box" data-screen="1">
      <div class="box box-closed" aria-label="Hop qua">
        <img src="carton-box.png" alt="Hop carton">
      </div>
    </section>

    <section class="screen screen-cat" data-screen="2">
      <div class="gift-scene" aria-label="Hop qua va anh bat ngo">
        <div class="gift-gallery" aria-live="polite"></div>
        <div class="box box-open">
          <img src="open-box.png" alt="Hop carton dang mo">
        </div>
      </div>
    </section>

    <button class="next-button" type="button">Ti&#7871;p t&#7909;c</button>
  </main>

  <script src="Mi.js"></script>
</body>
</html>
